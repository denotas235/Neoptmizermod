name: Build Mod

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build JAR (NexusOptimizer)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}- 

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace --refresh-dependencies

      - name: Collect JAR
        run: |
          mkdir -p out
          cp build/libs/*.jar out/ 2>/dev/null || true
          ls -la out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusOptimizer-${{ github.sha }}
          path: out/*.jar
          if-no-files-found: warn